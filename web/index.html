<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>pawlos</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0d;
      --surface: #141414;
      --border: #222;
      --accent: #7c6aff;
      --accent-glow: rgba(124,106,255,.25);
      --text: #e8e8e8;
      --muted: #666;
      --user-bg: #1a1a2e;
      --bot-bg: #111;
      --font: 'Inter', system-ui, sans-serif;
      --mono: 'JetBrains Mono', 'Fira Code', monospace;
    }

    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font); font-size: 15px; }

    #app { display: flex; flex-direction: column; height: 100vh; max-width: 860px; margin: 0 auto; }

    header {
      display: flex; align-items: center; gap: 12px;
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }
    header .logo { font-size: 22px; }
    header h1 { font-size: 16px; font-weight: 600; letter-spacing: .5px; }
    header .status { margin-left: auto; width: 8px; height: 8px; border-radius: 50%; background: #44ffaa; box-shadow: 0 0 6px #44ffaa; }

    #controls {
      display: flex; gap: 8px; padding: 10px 20px;
      background: var(--surface); border-bottom: 1px solid var(--border);
    }
    #controls select, #controls input {
      background: #1c1c1c; border: 1px solid var(--border);
      color: var(--text); padding: 5px 10px; border-radius: 6px; font-size: 13px;
    }
    #controls label { font-size: 12px; color: var(--muted); align-self: center; }

    #messages {
      flex: 1; overflow-y: auto; padding: 20px;
      display: flex; flex-direction: column; gap: 16px;
    }

    .msg { display: flex; flex-direction: column; gap: 4px; max-width: 80%; }
    .msg.user { align-self: flex-end; align-items: flex-end; }
    .msg.bot  { align-self: flex-start; }

    .bubble {
      padding: 12px 16px; border-radius: 12px; line-height: 1.6;
      font-size: 14px; white-space: pre-wrap; word-break: break-word;
    }
    .msg.user .bubble {
      background: var(--user-bg);
      border: 1px solid #2a2a4a;
      border-bottom-right-radius: 2px;
    }
    .msg.bot .bubble {
      background: var(--bot-bg);
      border: 1px solid var(--border);
      border-bottom-left-radius: 2px;
    }

    .bubble code { font-family: var(--mono); font-size: 13px; background: #1c1c1c; padding: 1px 5px; border-radius: 4px; }
    .bubble pre  { background: #1c1c1c; border: 1px solid var(--border); border-radius: 8px; padding: 14px; overflow-x: auto; margin: 8px 0; }
    .bubble pre code { background: none; padding: 0; }

    .meta { font-size: 11px; color: var(--muted); }

    .typing { display: flex; gap: 5px; align-items: center; padding: 12px 16px; }
    .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); animation: bounce .8s infinite; }
    .dot:nth-child(2) { animation-delay: .15s; }
    .dot:nth-child(3) { animation-delay: .30s; }
    @keyframes bounce { 0%,60%,100% { transform: translateY(0); } 30% { transform: translateY(-6px); } }

    #input-area {
      padding: 16px 20px;
      border-top: 1px solid var(--border);
      background: var(--surface);
      display: flex; gap: 10px; align-items: flex-end;
    }

    #message-input {
      flex: 1; resize: none; background: #1c1c1c;
      border: 1px solid var(--border); border-radius: 10px;
      color: var(--text); padding: 12px 14px;
      font-family: var(--font); font-size: 14px; line-height: 1.5;
      max-height: 180px; overflow-y: auto;
      transition: border-color .2s;
    }
    #message-input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-glow); }
    #message-input::placeholder { color: var(--muted); }

    #send-btn {
      width: 44px; height: 44px; border-radius: 10px;
      background: var(--accent); border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: opacity .15s, box-shadow .15s;
      flex-shrink: 0;
    }
    #send-btn:hover { opacity: .85; box-shadow: 0 0 12px var(--accent-glow); }
    #send-btn svg { width: 18px; height: 18px; fill: white; }
  </style>
</head>
<body>
<div id="app">
  <header>
    <span class="logo">🤖</span>
    <h1 id="agent-title">pawlos</h1>
    <div class="status" id="status-dot"></div>
  </header>

  <div id="controls">
    <label>Model:</label>
    <input id="model-input" type="text" placeholder="openai/gpt-4o" style="width:220px" />
    <label>Personality:</label>
    <select id="personality-select">
      <option value="">default</option>
      <option value="helpful">helpful</option>
      <option value="concise">concise</option>
      <option value="technical">technical</option>
      <option value="creative">creative</option>
      <option value="teacher">teacher</option>
      <option value="kawaii">kawaii ★</option>
      <option value="pirate">pirate ☠️</option>
      <option value="philosopher">philosopher</option>
      <option value="hype">hype 🔥</option>
    </select>
  </div>

  <div id="messages"></div>

  <div id="input-area">
    <textarea id="message-input" rows="1" placeholder="Message pawlos…"></textarea>
    <button id="send-btn" title="Send">
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>
</div>

<script type="module" src="/src/main.ts"></script>
</body>
</html>
